<!doctype html>

<html>
  <head>
    <title>Vault</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        display: flex;
        justify-content: center;
      }

      .container {
        width: 100%;
        max-width: 500px;
        padding: 20px;
      }

      h2 {
        text-align: center;
        color: #38bdf8;
      }

      p {
        text-align: center;
        color: #94a3b8;
      }

      .upload-box {
        border: 2px dashed #38bdf8;
        padding: 30px;
        border-radius: 12px;
        text-align: center;
        margin-top: 20px;
        transition: 0.3s;
      }

      .upload-box.dragover {
        background: rgba(56, 189, 248, 0.1);
        border-color: #0ea5e9;
      }

      button {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background: #38bdf8;
        color: black;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        display: inline-block;
        margin-top: 10px;
      }

      button:hover {
        background: #0ea5e9;
      }

      /* File preview */
      .file-preview {
        margin-top: 12px;
        background: rgba(255, 255, 255, 0.08);
        padding: 8px 12px;
        border-radius: 8px;
        display: none;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      /* File list */
      .file-list {
        margin-top: 40px;
      }

      .file-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .file-item a {
        margin-left: 10px;
        color: #38bdf8;
        text-decoration: none;
        font-size: 13px;
      }

      .file-item:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .empty {
        text-align: center;
        margin-top: 20px;
        color: #94a3b8;
      }

      .toast {
        position: fixed;
        bottom: -100px;
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 14px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0;
        transition: all 0.4s ease;
        z-index: 1000;
      }

      /* Show animation */
      .toast.show {
        bottom: 30px;
        opacity: 1;
      }

      /* Success version */
      .toast.success {
        background: linear-gradient(135deg, #22c55e, #16a34a);
      }

      /* Icon */
      .toast .icon {
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <div id="toast" class="toast">
      <span class="icon">❌</span>
      <span id="toastMsg"></span>
    </div>
    <div class="container">
      <h2>📁 Your Documents</h2>
      <p>Fast upload Fast access</p>

      <!-- Upload -->
      <div class="upload-box" id="drop-area">
        <form action="/upload" method="post" enctype="multipart/form-data">
          <input type="file" name="file" id="fileInput" multiple hidden />

          <p>📂 Drag & Drop file here</p>
          <p>or</p>

          <button type="button" onclick="fileInput.click()">Choose File</button>

          <!-- File preview -->
          <div id="filePreview" class="file-preview">
            <span id="fileNames"></span>
            <button type="button" id="removeFile">×</button>
          </div>

          <br />
          <button type="submit">Upload</button>
        </form>
      </div>

      <!-- File List -->
      {% if files %}
      <div class="file-list">
        {% for file in files %}
        <div class="file-item">
          <span>📄 {{ file[2] }}</span>
          <div>
            <a href="/files/{{ file[2] }}" target="_blank">View</a>
            <a href="/delete/{{ file[0] }}">Delete</a>
          </div>
        </div>
        {% endfor %}
      </div>
      {% else %}
      <div class="empty">No files uploaded yet</div>
      {% endif %}
    </div>

    <script>
          const dropArea = document.getElementById("drop-area");
          const fileInput = document.getElementById("fileInput");
          const fileNames = document.getElementById("fileNames");
          const filePreview = document.getElementById("filePreview");
          const removeBtn = document.getElementById("removeFile");

          // Prevent default
          ["dragenter", "dragover", "dragleave", "drop"].forEach((event) => {
            dropArea.addEventListener(event, (e) => e.preventDefault());
          });

          // Highlight
          dropArea.addEventListener("dragover", () => {
            dropArea.classList.add("dragover");
          });

          dropArea.addEventListener("dragleave", () => {
            dropArea.classList.remove("dragover");
          });

          // Drop
          dropArea.addEventListener("drop", (e) => {
            dropArea.classList.remove("dragover");
            fileInput.files = e.dataTransfer.files;
            showFiles();
          });

          // Select
          fileInput.addEventListener("change", showFiles);

          function showFiles() {
            if (fileInput.files.length > 0) {
              let names = [];
              for (let i = 0; i < fileInput.files.length; i++) {
                names.push(fileInput.files[i].name);
              }

              fileNames.innerText = names.join(", ");
              filePreview.style.display = "flex";
            }
          }

          // Remove
          removeBtn.addEventListener("click", () => {
            fileInput.value = "";
            filePreview.style.display = "none";
          });

      function showToast(message, type = "error") {
        const toast = document.getElementById("toast");
        const msg = document.getElementById("toastMsg");

        msg.innerText = message;
        toast.classList.add("show");

        // change color for success
        if (type === "success") {
          toast.classList.add("success");
        } else {
          toast.classList.remove("success");
        }

        toast.classList.add("show");

        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }

      // Flash message display
      {% with messages = get_flashed_messages() %}
      {% if messages %}
      var messages = {{ messages | tojson }};
      messages.forEach(function(msg) {
        showToast(msg);
      });
      {% endif %}
      {% endwith %}
    </script>
  </body>
</html>
