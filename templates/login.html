<!doctype html>
<html>
  <head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .box {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        padding: 35px 30px;
        border-radius: 18px;
        width: 320px;
        text-align: center;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      }

      h2 {
        margin-bottom: 20px;
        color: #38bdf8;
        font-weight: 600;
      }

      .input-group {
        margin-bottom: 15px;
        text-align: left;
      }

      input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        font-size: 14px;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #38bdf8;
        color: black;
        font-weight: bold;
      }

      .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #94a3b8;
      }

      a {
        color: #38bdf8;
        text-decoration: none;
      }
    </style>

    {% with messages = get_flashed_messages() %} {% if messages %} {% for msg in
    messages %}
    <div
      style="
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: #ef4444;
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 14px;
        transition: all 0.4s ease;
      "
    >
      {{ msg }}
    </div>
    {% endfor %} {% endif %} {% endwith %}
  </head>

  <body>
    <div class="box">
      <h2>🔐 Welcome Back</h2>

      <form method="post">
        <div class="input-group">
          <input name="phone" placeholder="Phone Number" required />
        </div>

        <div class="input-group">
          <input
            name="password"
            type="password"
            placeholder="Password"
            required
          />
        </div>

        <button type="submit">Login</button>
      </form>

      <div class="footer">
        <a href="/register">Register here</a>
      </div>
    </div>
  </body>
</html>
