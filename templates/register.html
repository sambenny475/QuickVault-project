<!doctype html>
<html>
  <head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      body {
        height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", sans-serif;
      }

      .box {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        padding: 35px;
        border-radius: 18px;
        width: 320px;
        text-align: center;
      }

      h2 {
        color: #38bdf8;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.08);
        color: white;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #38bdf8;
        color: black;
        font-weight: bold;
      }

      a {
        color: #38bdf8;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h2>📝 Create Account</h2>

      <form method="post">
        <input name="phone" placeholder="Phone Number" required />
        <input
          name="password"
          type="password"
          placeholder="Password"
          required
        />
        <button>Create Account</button>
      </form>
      <p><a href="/">Already have an account? Login here</a></p>
    </div>
  </body>
</html>
